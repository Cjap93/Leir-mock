<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow1" cx="80%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#B5623A" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#B5623A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="8%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#7A8F6A" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7A8F6A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#F5F1EB"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- chalkboard-style rule line -->
  <line x1="0" y1="345" x2="1200" y2="345" stroke="#2D2926" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="90" y="270" font-family="Georgia, 'Times New Roman', serif" font-weight="300" font-size="120" fill="#2D2926" letter-spacing="-2">Leir</text>
  <text x="90" y="340" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="400" font-size="46" fill="#B5623A">mat lagad varje vardag</text>

  <!-- eyebrow -->
  <line x1="90" y1="150" x2="120" y2="150" stroke="#B5623A" stroke-width="2"/>
  <text x="134" y="155" font-family="Courier New, monospace" font-size="17" letter-spacing="2" fill="#7A5C38">LUNCH · ULLEVIGATAN, GÖTEBORG</text>

  <!-- Stamp motif -->
  <g transform="translate(1000,420) rotate(-8)">
    <circle cx="0" cy="0" r="118" fill="none" stroke="#B5623A" stroke-width="3"/>
    <circle cx="0" cy="0" r="102" fill="none" stroke="#B5623A" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.5"/>
    <text x="0" y="-18" text-anchor="middle" font-family="Courier New, monospace" font-size="16" letter-spacing="3" fill="#B5623A">DAGENS</text>
    <text x="0" y="34" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-weight="600" font-size="46" fill="#B5623A">Lunch</text>
  </g>
</svg>
